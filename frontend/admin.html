<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Admin Panel – Stock Price Prediction System</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body onload="loadAdminUsers()">
  <!-- NAVBAR -->
  <nav class="ds-navbar">
    <div class="ds-navbar-left">
      <a href="index.html" class="ds-logo">
        <span class="ds-logo-icon">📈</span>
        <span class="ds-logo-text">Stock Price Prediction System</span>
      </a>
      <div class="ds-search-wrapper">
        <input
          type="text"
          class="ds-search-input"
          placeholder="Search for stocks..."
        />
      </div>
    </div>

    <div class="ds-navbar-right">
      <a href="index.html" class="ds-nav-link">Home</a>
      <a href="dashboard.html" class="ds-nav-link">Tools</a>
      <a href="dashboard.html" class="ds-nav-link">Portfolio</a>
      <a href="login.html" class="ds-btn ds-btn-outline">Login</a>
      <a href="register.html" class="ds-btn ds-btn-primary">Sign Up</a>
    </div>
  </nav>

  <main class="page-main">
    <div class="container">
      <div class="top-bar">
        <h2>Admin Panel</h2>
        <div class="logout-group">
          <a href="dashboard.html">
            <button class="small-button secondary" type="button">Dashboard</button>
          </a>
          <button id="logout-btn" class="small-button" type="button">Logout</button>
        </div>
      </div>

      <div class="card">
        <h3>Registered Users</h3>
        <div id="admin-msg" class="message"></div>

        <div class="table-wrapper">
          <table id="users-table">
            <thead>
              <tr>
                <th>Email</th>
                <th>Name</th>
                <th>Role</th>
              </tr>
            </thead>
            <tbody id="users-table-body">
              <!-- filled by JS -->
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </main>

  <!-- FOOTER -->
  <footer class="ds-footer">
    <div class="ds-footer-inner">
      <div class="ds-footer-left">
        <span class="ds-footer-logo">Stock Price Prediction System</span>
        <span class="ds-footer-text">
          © 2025 Stock Price Prediction System. All rights reserved.
        </span>
      </div>
      <div class="ds-footer-links">
        <a href="report.html">Reports</a>
        <a href="admin.html">Admin</a>
       
      </div>
    </div>
  </footer>

  <script src="script.js"></script>
</body>
</html>
