<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>DeepStock – Admin</title>
  <link rel="stylesheet" href="style.css" />
  <script src="script.js" defer></script>
</head>
<body class="dashboard-body">
  <!-- NAVBAR -->
  <header class="ds-navbar">
    <div class="ds-navbar-left">
      <a href="index.html" class="ds-logo">
        <span class="ds-logo-icon">📈</span>
        <span class="ds-logo-text">DeepStock</span>
      </a>
      <div class="ds-search-wrapper">
        <input
          type="text"
          class="ds-search-input"
          placeholder="Search stocks, ideas, or themes..."
        />
      </div>
    </div>
    <div class="ds-navbar-right">
      <a href="dashboard.html" class="ds-nav-link">Dashboard</a>
      <a href="report.html" class="ds-nav-link">Reports</a>
      <a href="admin.html" class="ds-nav-link active">Admin</a>
      <button class="ds-btn ds-btn-outline" onclick="logout()">Log out</button>
    </div>
  </header>

  <main class="page-main">
    <div class="container">
      <div class="card">
        <h1 class="center">Admin – Users</h1>
        <p class="text-small center">
          View registered users and their details.
        </p>

        <p id="admin-msg" class="message"></p>

        <div style="overflow-x:auto; margin-top:12px;">
          <table id="users-table" style="width:100%; font-size:13px; border-collapse:collapse;">
            <thead>
              <tr>
                <th>ID</th>
                <th>Name</th>
                <th>Email</th>
                <th>Phone</th>
                <th>DOB</th>
                <th>Profession</th>
                <th>Role</th>
              </tr>
            </thead>
            <tbody id="users-table-body"></tbody>
          </table>
        </div>
      </div>
    </div>
  </main>

  <!-- FOOTER -->
  <footer class="ds-footer">
    <div class="ds-footer-inner">
      <div class="ds-footer-left">
        <span class="ds-footer-logo">DeepStock</span>
        <span>© 2026. All rights reserved.</span>
      </div>
      <div class="ds-footer-links">
        <a href="#">Privacy</a>
        <a href="#">Terms</a>
        <a href="#">Support</a>
      </div>
    </div>
  </footer>

  <script>
    document.addEventListener("DOMContentLoaded", loadAdminUsers);
  </script>
</body>
</html>
