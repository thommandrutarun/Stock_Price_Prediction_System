<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Stock Price Prediction System - Admin</title>
  <link rel="stylesheet" href="style.css" />
  <script defer src="script.js"></script>
</head>
<body onload="loadAdminUsers()">
  <div class="container">
    <div class="card">
      <h1 class="center">Admin Panel</h1>
      <p class="center text-small">
        Manage users registered in the system.
      </p>

      <div id="admin-msg" class="message"></div>

      <table class="admin-table">
        <thead>
          <tr>
            <th>ID</th>
            <th>Name</th>
            <th>Email</th>
            <th>Phone</th>
            <th>Role</th>
          </tr>
        </thead>
        <tbody id="users-table-body"></tbody>
      </table>
    </div>
  </div>
</body>
</html>
