<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Stock Price Prediction System - Reports</title>
  <link rel="stylesheet" href="style.css" />
  <script defer src="script.js"></script>
</head>
<body onload="loadReportsSummary()">
  <div class="container">
    <div class="card">
      <h1 class="center">Reports</h1>
      <p class="center text-small">
        Basic system summary and popular stock symbols.
      </p>

      <div id="reports-msg" class="message"></div>

      <div class="chart-panel">
        <p>Total registered users: <span id="report-users">-</span></p>
        <p>Popular symbols: <span id="report-symbols">-</span></p>
      </div>
    </div>
  </div>
</body>
</html>
