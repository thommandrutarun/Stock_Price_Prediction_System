<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Stock Price Prediction System – Portfolio</title>
  <link rel="stylesheet" href="style.css" />
  <script src="script.js" defer></script>
</head>
<body class="dashboard-body">
  <!-- NAVBAR -->
  <header class="ds-navbar">
    <div class="ds-navbar-left">
      <a href="index.html" class="ds-logo">
        <span class="ds-logo-icon">📈</span>
        <span class="ds-logo-text">Stock Price Prediction System</span>
      </a>
      <div class="ds-search-wrapper">
        <input
          type="text"
          class="ds-search-input"
          placeholder="Search stocks, ideas, or themes..."
        />
      </div>
    </div>
    <div class="ds-navbar-right">
      <a href="home.html" class="ds-nav-link">Home</a>
      <a href="dashboard.html" class="ds-nav-link">Dashboard</a>
      <a href="report.html" class="ds-nav-link active">Reports</a>
      <button class="ds-btn ds-btn-outline" onclick="logout()">Log out</button>
    </div>
  </header>

  <main class="page-main">
    <div class="container">
      <div class="card">
        <h1 class="center">Portfolio</h1>
        <p class="text-small center">
          Your stocks and their latest performance.
        </p>

        <div style="display:flex; gap:20px; margin-top:18px; flex-wrap:wrap;">
          <!-- left: top movers -->
          <div style="flex:2 1 360px;">
            <h3 class="text-small" style="margin-bottom:8px;">Top movers in your list</h3>
            <div id="positions-list"></div>
          </div>

          <!-- right: portfolio summary -->
          <div style="flex:1 1 220px;">
            <div class="card" style="padding:14px 16px;">
              <p class="text-small">Your portfolio</p>
              <p style="font-size:22px; margin:6px 0;">
                ₹<span id="pf-total">0.00</span>
              </p>
            </div>
          </div>
        </div>

        <p id="prof-msg" class="message" style="margin-top:12px;"></p>
      </div>
    </div>
  </main>

  <!-- FOOTER -->
  <footer class="ds-footer">
    <div class="ds-footer-inner">
      <div class="ds-footer-left">
        <span class="ds-footer-logo">Stock Price Prediction System</span>
        <span>© 2026. All rights reserved.</span>
      </div>
      <div class="ds-footer-links">
        <a href="#">Privacy</a>
        <a href="#">Terms</a>
        <a href="#">Support</a>
      </div>
    </div>
  </footer>
</body>
</html>
